name: Actualizar Dashboard

on:
  schedule:
    - cron: '0 11 * * 1-5'   # 8:00 AM Argentina (lun-vie)
    - cron: '0 21 * * 1-5'   # 6:00 PM Argentina (lun-vie)
  workflow_dispatch:

jobs:
  actualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar scraper
        run: python scraper_senado.py
        env:
          FECHA_DESDE: "01/03/2026"
          EXCEL_SENADORES: "Senadores 2026.xlsx"
          ARCHIVO_SALIDA: index.html
          ARCHIVO_HISTORICOS: trazabilidad.tsv

      # SEMÁNTICO: desactivado temporalmente - reactivar cuando se retome
      - name: Generar embeddings semánticos
        if: false
        run: python generar_embeddings.py
        env:
          ARCHIVO_HISTORICOS: trazabilidad.tsv
          EMBEDDINGS_PATH: embeddings.json
        continue-on-error: true   # Si falla el modelo, el deploy no se interrumpe

      - name: Commit y push si hubo cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "Sin cambios en index.html"
          else
            FECHA=$(TZ='America/Argentina/Buenos_Aires' date '+%d/%m/%Y %H:%M ART')
            git commit -m "dashboard: actualizacion automatica ${FECHA}"
            git push
          fi
